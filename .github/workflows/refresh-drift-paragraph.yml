# Keeps the drift paragraph on the homepage in step with the board it describes.
#
# The paragraph used to be written by hand and went false twice — each time
# because the weekly probe moved the numbers underneath prose that couldn't
# move with them. It's generated now, in model-drift, where every sentence is a
# predicate over the board's own numbers. This job carries that text across.
#
# It opens a PR rather than pushing to main. The page is the outward-facing
# artifact of a job search; the rule that applies to everything else here
# applies to it too — automate the work, keep the publish a human act. The diff
# is one paragraph, so the review is one glance.
name: refresh drift paragraph

on:
  schedule:
    # Mondays 10:00 UTC — model-drift probes at 08:17 and commits its own
    # results, so by now narrative.json is the current week's.
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write          # the fallback path, for when PR creation is disallowed

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Fails closed: unreachable JSON, a missing marker, or a paragraph that
      # looks wrong all exit non-zero without touching index.html. A stale but
      # true page is a much better outcome than a mangled one.
      - name: Rebuild the paragraph from the board
        run: python tools/refresh_drift.py

      - name: Open a PR if the page has moved
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- index.html; then
            echo "The page already matches the board — nothing to do."
            exit 0
          fi

          branch="drift-paragraph-$(date -u +%Y-%m-%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git commit -am "Refresh the drift paragraph from this week's run"
          git push -u origin "$branch" --force-with-lease

          # The PR body carries the new prose so the review needs no clicking.
          new_text=$(python tools/refresh_drift.py --print-current)

          if gh pr list --head "$branch" --json number --jq 'length' | grep -qv '^0$'; then
            echo "PR already open for $branch"
            exit 0
          fi

          # A PR is the preferred hand-off, but "Allow GitHub Actions to create and
          # approve pull requests" is off by default, and without it gh pr create
          # fails after the branch is already pushed. Fall back to an issue that
          # links the branch, so the work is never stranded and publishing still
          # takes a human action either way.
          body=$(printf 'The board moved, so the generated paragraph did too.\n\n> %s\n\nRegenerated by [model-drift](https://github.com/egnaro9/model-drift) narrative.py - every sentence is a predicate over the board own numbers, so a claim that stopped being true is dropped rather than reworded.\n' "$new_text")

          if gh pr create --title "Drift paragraph: this run's numbers" --body "$body" --head "$branch"; then
            exit 0
          fi

          echo "::warning::could not open a PR (Actions may lack PR-create permission) - opening an issue instead"
          gh issue create \
            --title "Drift paragraph is behind the board" \
            --body "$(printf '%s\n\nBranch `%s` is pushed and ready to merge:\nhttps://github.com/%s/compare/main...%s?expand=1\n\nOr enable **Settings -> Actions -> General -> Allow GitHub Actions to create and approve pull requests** and this will open a PR by itself next time.\n' "$body" "$branch" "$GITHUB_REPOSITORY" "$branch")"
